function renderSummaryModal() {
  const body = document.getElementById('summaryModalBody');
  if (!body) return;

  const floorLabels = { '1F':'1F 전체', '2F':'2F 전체', '2-2F':'2F 메자닌', '4F':'4F 전체', '4-2F':'4-2F 메자닌' };
  const isMezFloor = fk => fk === '2-2F' || fk === '4-2F';

  const floorAreas = {};
  FLOOR_ORDER.forEach(fk => { floorAreas[fk] = calcFloorAreas(fk); });

  const activeIds = new Set();
  FLOOR_ORDER.forEach(fk => Object.keys(floorAreas[fk]).forEach(cid => activeIds.add(+cid)));
  companies.forEach(co => { if ((co.extras||[]).length > 0) activeIds.add(co.id); });
  const activeCos = companies.filter(co => activeIds.has(co.id));

  if (activeCos.length === 0) {
    body.innerHTML = '<p style="color:#a0aec0;text-align:center;padding:40px;">배정된 스판이 없습니다.</p>';
    return;
  }

  // 단계 13: 실/계약 이중 열 구조
  // thead 1행: 층 그룹 (colspan=2) + 그외 + 합계(colspan=2)
  // thead 2행: 실면적 | 계약면적 per floor + 실합계 | 계약합계
  let html = `<table class="modal-gtab"><thead>
    <tr>
      <th rowspan="2" style="text-align:left;min-width:110px;vertical-align:middle;">회사</th>`;
  FLOOR_ORDER.forEach(fk => {
    const label = floorLabels[fk];
    const subLabel = isMezFloor(fk) ? '(실면적 기준)' : '';
    html += `<th colspan="2" style="background:#f0f4f8;">${label}<br><span style="font-size:10px;font-weight:normal;color:#718096;">${subLabel}</span></th>`;
  });
  // 단계 14: 기타 열 (colspan=2)
  html += `<th colspan="2" style="background:#f0fdf4;">기타<br><span style="font-size:10px;font-weight:normal;color:#718096;">(직접입력)</span></th>`;
  html += `<th rowspan="2" style="vertical-align:middle;">그외</th>
      <th colspan="2" style="background:#dbeafe;">합계</th>
    </tr>
    <tr>`;
  FLOOR_ORDER.forEach(fk => {
    if (isMezFloor(fk)) {
      html += `<th style="font-size:11px;background:#f7fafc;color:#4a5568;">실면적</th>
               <th style="font-size:11px;background:#f7fafc;color:#718096;">실면적</th>`;
    } else {
      html += `<th style="font-size:11px;background:#f7fafc;color:#4a5568;">실면적</th>
               <th style="font-size:11px;background:#fff7ed;color:#9c4221;">계약면적</th>`;
    }
  });
  // 단계 14: 기타 서브헤더
  html += `<th style="font-size:11px;background:#f0fdf4;color:#166534;">실면적</th>
            <th style="font-size:11px;background:#dcfce7;color:#14532d;">계약면적</th>`;
  html += `<th style="font-size:11px;background:#eff6ff;color:#1e40af;">실면적</th>
            <th style="font-size:11px;background:#dbeafe;color:#1e3a8a;">계약면적</th>
    </tr></thead><tbody>`;

  // 열별 합계 누적 (실/계약 분리)
  const colActual = {}, colContract = {};
  FLOOR_ORDER.forEach(fk => { colActual[fk] = 0; colContract[fk] = 0; });
  let allExtrasPy = 0;
  let totalGitaActual = 0, totalGitaContract = 0;
  let grandActual = 0, grandContract = 0;

  const mkCell = (pyVal, cPyVal, bg) => {
    if (pyVal <= 0) return `<td class="modal-zero">—</td><td class="modal-zero">—</td>`;
    const bgStyle = bg ? `style="background:${bg}"` : '';
    const bgStyle2 = bg ? `style="background:${bg};"` : 'style="background:#fff7ed;"';
    return `<td ${bgStyle}>
      <div class="modal-cell-val">${fmt(pyVal)}평</div>
      <div class="modal-cell-sub">${fmt(pyVal*3.3)}m²</div>
    </td><td ${bgStyle2}>
      <div class="modal-cell-val" style="color:#9c4221;">${fmt(cPyVal)}평</div>
      <div class="modal-cell-sub">${fmt(cPyVal*3.3)}m²</div>
    </td>`;
  };

  activeCos.forEach(co => {
    let rowActual = 0, rowContract = 0;
    const coIdx = companies.findIndex(c => c.id === co.id);
    html += `<tr><td><div class="modal-co-name">
      <span class="modal-dot" style="background:${co.color}"></span>${co.name}
    </div></td>`;

    FLOOR_ORDER.forEach(fk => {
      const a = floorAreas[fk][co.id] || 0;
      const pyVal = py(a);
      const cPyVal = contractPy(fk, pyVal);
      colActual[fk] += pyVal;
      colContract[fk] += cPyVal;
      rowActual += pyVal;
      rowContract += cPyVal;
      html += mkCell(pyVal, cPyVal);
    });

    // 단계 14: 기타 열 (클릭 편집)
    // 단계 15: 계약면적도 직접 입력 지원 — contractPy > 0이면 직접값, 아니면 자동 계산
    const gitaActual = (co.gita||{}).actualPy || 0;
    const gitaContractVal = gitaContractPy(co);
    const gitaIsManual = ((co.gita||{}).contractPy||0) > 0;
    totalGitaActual += gitaActual;
    totalGitaContract += gitaContractVal;
    rowActual += gitaActual;
    rowContract += gitaContractVal;
    if (gitaActual > 0) {
      const contractDisplay = gitaIsManual
        ? `<div class="modal-cell-val" style="color:#14532d;">${fmt(gitaContractVal)}평</div>
           <div class="modal-cell-sub">${fmt(gitaContractVal*3.3)}m²</div>`
        : `<div class="modal-cell-val" style="color:#14532d;">${fmt(gitaContractVal)}평</div>
           <div class="modal-cell-sub" style="color:#9a7744;">(자동)</div>`;
      html += `<td style="cursor:pointer;background:#f0fdf4;" onclick="editGita(${coIdx})" title="클릭하여 수정">
        <div class="modal-cell-val" style="color:#166534;">${fmt(gitaActual)}평</div>
        <div class="modal-cell-sub">${fmt(gitaActual*3.3)}m²</div>
      </td><td style="cursor:pointer;background:#dcfce7;" onclick="editGitaContract(${coIdx})" title="클릭하여 계약면적 수정">
        ${contractDisplay}
      </td>`;
    } else {
      html += `<td class="modal-zero" style="cursor:pointer;" onclick="editGita(${coIdx})" title="클릭하여 입력">＋</td>
               <td class="modal-zero" style="cursor:pointer;" onclick="editGitaContract(${coIdx})" title="실면적 입력 후 수정 가능">—</td>`;
    }

    // extras 열 (계약 변환 없음)
    const extrasPy = (co.extras||[]).reduce((s, ex) => s + ex.py, 0);
    rowActual += extrasPy;
    rowContract += extrasPy;
    allExtrasPy += extrasPy;
    if (extrasPy > 0) {
      const tip = (co.extras||[]).map(ex => `${ex.name}: ${fmt(ex.py)}평`).join('\n');
      html += `<td title="${tip}">
        <div class="modal-cell-val">${fmt(extrasPy)}평</div>
        <div class="modal-cell-sub">${(co.extras||[]).length}항목</div>
      </td>`;
    } else {
      html += `<td class="modal-zero">—</td>`;
    }

    grandActual += rowActual;
    grandContract += rowContract;
    html += `<td style="background:#eff6ff;">
      <div class="modal-cell-val" style="font-size:17px;">${fmt(rowActual)}평</div>
      <div class="modal-cell-sub">${fmt(rowActual*3.3)}m²</div>
    </td><td style="background:#dbeafe;">
      <div class="modal-cell-val" style="font-size:17px;color:#1e3a8a;">${fmt(rowContract)}평</div>
      <div class="modal-cell-sub">${fmt(rowContract*3.3)}m²</div>
    </td></tr>`;
  });

  // 합계 행
  html += `<tr class="modal-total-row"><td><div class="modal-co-name">합계</div></td>`;
  FLOOR_ORDER.forEach(fk => {
    html += mkCell(colActual[fk], colContract[fk], colActual[fk] > 0 ? '' : null);
  });
  // 기타 합계
  if (totalGitaActual > 0) {
    html += `<td style="background:#f0fdf4;"><div class="modal-cell-val" style="color:#166534;">${fmt(totalGitaActual)}평</div></td>
             <td style="background:#dcfce7;"><div class="modal-cell-val" style="color:#14532d;">${fmt(totalGitaContract)}평</div></td>`;
  } else {
    html += `<td class="modal-zero">—</td><td class="modal-zero">—</td>`;
  }
  html += allExtrasPy > 0
    ? `<td><div class="modal-cell-val">${fmt(allExtrasPy)}평</div></td>`
    : `<td class="modal-zero">—</td>`;
  html += `<td style="background:#eff6ff;">
    <div class="modal-cell-val" style="font-size:18px;">${fmt(grandActual)}평</div>
    <div class="modal-cell-sub">${fmt(grandActual*3.3)}m²</div>
  </td><td style="background:#bfdbfe;">
    <div class="modal-cell-val" style="font-size:18px;color:#1e3a8a;">${fmt(grandContract)}평</div>
    <div class="modal-cell-sub">${fmt(grandContract*3.3)}m²</div>
  </td></tr>`;

  html += `</tbody></table>`;
  body.innerHTML = html;
}

// 단계 14: 기타 실면적 직접 입력
function editGita(coIdx) {
  const co = companies[coIdx];
  if (!co) return;
  const current = (co.gita||{}).actualPy || 0;
  const input = prompt(`${co.name} — 기타 실면적 입력 (평 단위):\n계약면적은 실면적÷77.55%로 자동 계산됩니다.`, current > 0 ? current : '');
  if (input === null) return;
  const val = parseFloat(input);
  if (isNaN(val) || val < 0) { alert('올바른 숫자를 입력하세요.'); return; }
  if (!co.gita) co.gita = {actualPy:0, contractPy:0};
  co.gita.actualPy = val;
  saveState();
  renderSummaryModal();
  renderSummary();
}

// 단계 15: 기타 계약면적 직접 입력
function editGitaContract(coIdx) {
  const co = companies[coIdx];
  if (!co) return;
  const autoVal = ((co.gita||{}).actualPy||0) > 0 ? fmt((co.gita.actualPy / 0.7755)) : '0';
  const current = ((co.gita||{}).contractPy||0) > 0 ? (co.gita.contractPy) : '';
  const input = prompt(
    `${co.name} — 기타 계약면적 직접 입력 (평 단위)\n빈 값 입력 시 자동 계산(실면적÷77.55% = 약 ${autoVal}평)으로 초기화됩니다.`,
    current
  );
  if (input === null) return;
  if (!co.gita) co.gita = {actualPy:0, contractPy:0};
  if (input.trim() === '') {
    co.gita.contractPy = 0;
  } else {
    const val = parseFloat(input);
    if (isNaN(val) || val < 0) { alert('올바른 숫자를 입력하세요.'); return; }
    co.gita.contractPy = val;
  }
  saveState();
  renderSummaryModal();
  renderSummary();
}

function wrapSVGfor169(srcSvg, slideW, slideH) {
  const srcW = +srcSvg.getAttribute('width');
  const srcH = +srcSvg.getAttribute('height');
  const slideRatio = slideW / slideH;
  const srcRatio   = srcW  / srcH;
  let viewW, viewH, offX, offY;
  if (srcRatio > slideRatio) {
    viewW = srcW; viewH = srcW / slideRatio;
    offX  = 0;    offY  = (viewH - srcH) / 2;
  } else {
    viewH = srcH; viewW = srcH * slideRatio;
    offY  = 0;    offX  = (viewW - srcW) / 2;
  }
  viewW = Math.round(viewW); viewH = Math.round(viewH);
  const NS = 'http://www.w3.org/2000/svg';
  const wrap = document.createElementNS(NS, 'svg');
  wrap.setAttribute('xmlns', NS);
  wrap.setAttribute('width',  viewW);
  wrap.setAttribute('height', viewH);
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', viewW); bg.setAttribute('height', viewH);
  bg.setAttribute('fill', '#ffffff');
  wrap.appendChild(bg);
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${Math.round(offX)},${Math.round(offY)})`);
  Array.from(srcSvg.childNodes).forEach(n => g.appendChild(n.cloneNode(true)));
  wrap.appendChild(g);
  return wrap;
}

function svgToDataURL(svgEl) {
  return new Promise((resolve, reject) => {
    const svgW = +svgEl.getAttribute('width');
    const svgH = +svgEl.getAttribute('height');
    const xml = new XMLSerializer().serializeToString(svgEl);
    const blob = new Blob([xml], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = 2; // retina quality
      canvas.width = svgW * scale;
      canvas.height = svgH * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, svgW, svgH);
      ctx.drawImage(img, 0, 0, svgW, svgH);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = reject;
    img.src = url;
  });
}

// PPT 요약표 위치 설정 모달
// ═══════════════════════════════════════════════════
let pptTableXFrac = null;
let pptTableYFrac = null;
let _pptDragCleanup = null;

function openPPTPositionModal() {
  document.getElementById('pptPosOverlay').classList.add('open');
  requestAnimationFrame(() => buildPPTPositionPreview());
}

function buildPPTPositionPreview() {
  const fk = currentFloor;
  const floorAreaMap = calcFloorAreas(fk);
  const rows = [];
  companies.forEach(co => {
    const mm2 = floorAreaMap[co.id] || 0;
    if (mm2 <= 0) return;
    const py = mm2 / 3.3e6;
    rows.push({ name: co.name, color: co.color, py, cpy: contractPy(fk, py) });
  });
  const totalPy = rows.reduce((s, r) => s + r.py, 0);
  const totalCPy = rows.reduce((s, r) => s + r.cpy, 0);

  let html = `<table style="border-collapse:collapse;font-size:9px;background:white;">`;
  html += `<tr>
    <th style="background:#1A3A5C;color:white;padding:2px 5px;width:8px;"></th>
    <th style="background:#1A3A5C;color:white;padding:2px 8px;white-space:nowrap;">회사</th>
    <th style="background:#1A3A5C;color:white;padding:2px 8px;white-space:nowrap;">실면적</th>
    <th style="background:#2C5282;color:white;padding:2px 8px;white-space:nowrap;">계약면적</th>
  </tr>`;
  rows.forEach(r => {
    html += `<tr>
      <td style="background:${r.color};padding:2px 4px;"></td>
      <td style="padding:2px 8px;border:1px solid #e2e8f0;white-space:nowrap;">${r.name}</td>
      <td style="padding:2px 8px;text-align:right;border:1px solid #e2e8f0;">${Math.round(r.py)}평</td>
      <td style="padding:2px 8px;text-align:right;background:#EEF4FF;border:1px solid #e2e8f0;">${Math.round(r.cpy)}평</td>
    </tr>`;
  });
  html += `<tr style="background:#EEF2F7;font-weight:bold;">
    <td style="padding:2px 4px;"></td>
    <td style="padding:2px 8px;color:#1A3A5C;">합계</td>
    <td style="padding:2px 8px;text-align:right;color:#1A3A5C;">${Math.round(totalPy)}평</td>
    <td style="padding:2px 8px;text-align:right;color:#1A3A5C;background:#DDE6F0;">${Math.round(totalCPy)}평</td>
  </tr></table>`;

  const handle = document.getElementById('pptTableHandle');
  handle.innerHTML = html;

  const preview = document.getElementById('pptSlidePreview');
  const oldSvg = preview.querySelector('svg');
  if (oldSvg) oldSvg.remove();

  const svg = buildFloorSVG(fk, cellStates[fk], true, null);
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.65;pointer-events:none;';
  svg.removeAttribute('id');
  preview.insertBefore(svg, handle);

  // 핸들 위치 설정 (렌더 후)
  requestAnimationFrame(() => {
    const pr = preview.getBoundingClientRect();
    const SLIDE_W = 13.33, SLIDE_H = 7.5, MARGIN = 0.31;
    const tableW = 0.18 + 2.2 + 1.55 + 1.55;
    const TABLE_H = (rows.length + 1) * 0.28 + 0.04;
    const defXFrac = (SLIDE_W - MARGIN - tableW) / SLIDE_W;
    const defYFrac = (SLIDE_H - TABLE_H - 0.08) / SLIDE_H;
    const xFrac = pptTableXFrac !== null ? pptTableXFrac : defXFrac;
    const yFrac = pptTableYFrac !== null ? pptTableYFrac : defYFrac;
    handle.style.left = (xFrac * pr.width) + 'px';
    handle.style.top  = (yFrac * pr.height) + 'px';

    if (_pptDragCleanup) _pptDragCleanup();
    _pptDragCleanup = setupPPTDrag(handle, preview);
  });
}

function setupPPTDrag(handle, container) {
  let dragging = false, sx, sy, sl, st;

  const onDown = e => {
    if (e.button !== 0) return;
    dragging = true;
    handle.classList.add('dragging');
    const cr = container.getBoundingClientRect();
    const hr = handle.getBoundingClientRect();
    sx = e.clientX; sy = e.clientY;
    sl = hr.left - cr.left; st = hr.top - cr.top;
    e.preventDefault();
  };
  const onMove = e => {
    if (!dragging) return;
    const cr = container.getBoundingClientRect();
    let nl = sl + (e.clientX - sx);
    let nt = st + (e.clientY - sy);
    nl = Math.max(0, Math.min(cr.width  - handle.offsetWidth,  nl));
    nt = Math.max(0, Math.min(cr.height - handle.offsetHeight, nt));
    handle.style.left = nl + 'px';
    handle.style.top  = nt + 'px';
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    const cr = container.getBoundingClientRect();
    pptTableXFrac = parseFloat(handle.style.left) / cr.width;
    pptTableYFrac = parseFloat(handle.style.top)  / cr.height;
  };

  handle.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  return () => {
    handle.removeEventListener('mousedown', onDown);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
}

function resetPPTTablePos() {
  pptTableXFrac = null;
  pptTableYFrac = null;
  buildPPTPositionPreview();
}

function closePPTPos() {
  document.getElementById('pptPosOverlay').classList.remove('open');
  if (_pptDragCleanup) { _pptDragCleanup(); _pptDragCleanup = null; }
}

function confirmPPTGenerate() {
  closePPTPos();
  exportPPT();
}

async function exportPPT() {
  const btn = document.getElementById('btnPPT');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  try {
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE'; // 13.33 × 7.5 in (= 33.87 × 19.05 cm)

    // pptxgenjs 좌표/크기 단위는 인치(inch). LAYOUT_WIDE = 13.33 × 7.5 in
    const SLIDE_W = 13.33;  // inches
    const SLIDE_H = 7.5;    // inches
    const MARGIN  = 0.31;   // inches (~0.8cm)
    const IMG_W   = SLIDE_W - MARGIN * 2;  // ~12.71in
    const SVG_PX_WIDTH = 1200;

    const floorLabels = {
      '1F': '1F 전체',
      '2F': '2F 전체',
      '2-2F': '2F 메자닌',
      '4F': '4F 전체',
      '4-2F': '4-2F 메자닌',
    };

    for (const fk of FLOOR_ORDER) {
      const fl = FLOORS[fk];
      const slide = pptx.addSlide();

      // background
      slide.background = { color: 'F5F7FA' };

      // title bar
      slide.addText(`🏭 아암센터 면적 관리  —  ${floorLabels[fk] || fk}`, {
        x: 0, y: 0, w: SLIDE_W, h: 0.43,
        fill: { color: '1A3A5C' },
        line: { type: 'none' },
        fontSize: 16, bold: true, color: 'FFFFFF',
        valign: 'middle',
        inset: 0.12,
      });

      // build SVG off-screen
      const svg = buildFloorSVG(fk, cellStates[fk], true, SVG_PX_WIDTH);
      const svgH = +svg.getAttribute('height');
      const svgW = +svg.getAttribute('width');
      const ratio = svgH / svgW;
      const imgY = 0.51;  // inches, just below title bar

      // 요약 계산: 웹 앱과 동일한 calcFloorAreas 사용
      const floorAreaMap = calcFloorAreas(fk); // {coId: mm²}
      const summaryRows = [];
      let totalPy = 0;
      let totalCPy = 0;
      companies.forEach(co => {
        const mm2 = floorAreaMap[co.id] || 0;
        if (mm2 <= 0) return;
        const pyVal = mm2 / 3.3e6;
        const cpyVal = contractPy(fk, pyVal);
        summaryRows.push({ name: co.name, color: co.color, py: pyVal, cpy: cpyVal });
        totalPy += pyVal;
        totalCPy += cpyVal;
      });

      // 도면을 슬라이드 배경으로 설정 (배경은 PPT에서 선택 불가 → 요약표 자유 이동 가능)
      const bgSvg = wrapSVGfor169(svg, SLIDE_W, SLIDE_H);
      slide.background = { data: await svgToDataURL(bgSvg) };

      // 회사별 평수 요약표: 도면 우하단에 오버레이
      if (summaryRows.length) {
        const ROW_H = 0.28;
        const TABLE_H = (summaryRows.length + 1) * ROW_H + 0.04;
        const COL_CLR = 0.18, COL_NAME = 2.2, COL_REAL = 1.55, COL_CONTRACT = 1.55;
        const fmtAreaCell = py => Math.round(py) + '평';
        const tableW = COL_CLR + COL_NAME + COL_REAL + COL_CONTRACT;
        const tableX = pptTableXFrac !== null ? pptTableXFrac * SLIDE_W : SLIDE_W - MARGIN - tableW;
        const tableY = pptTableYFrac !== null ? pptTableYFrac * SLIDE_H : SLIDE_H - TABLE_H - 0.08;
        const headerRow = [
          { text: '', options: { bold: true, fill: '1A3A5C', fontSize: 9 } },
          { text: '회사', options: { bold: true, color: 'FFFFFF', fill: '1A3A5C', align: 'center', fontSize: 9 } },
          { text: '실면적 (평/m²)', options: { bold: true, color: 'FFFFFF', fill: '1A3A5C', align: 'center', fontSize: 9 } },
          { text: '계약면적 (평/m²)', options: { bold: true, color: 'FFFFFF', fill: '2C5282', align: 'center', fontSize: 9 } },
        ];
        const dataTableRows = summaryRows.map(r => ([
          { text: '', options: { fill: r.color.replace('#',''), fontSize: 9 } },
          { text: r.name, options: { color: '1A1A1A', fill: 'FFFFFF', fontSize: 9 } },
          { text: fmtAreaCell(r.py), options: { color: '1A1A1A', fill: 'FFFFFF', align: 'right', fontSize: 8 } },
          { text: fmtAreaCell(r.cpy), options: { color: '1A3A5C', fill: 'EEF4FF', align: 'right', fontSize: 8 } },
        ]));
        const totalRow = [
          { text: '', options: { bold: true, fill: 'EEF2F7', fontSize: 9 } },
          { text: '합계', options: { bold: true, color: '1A3A5C', fill: 'EEF2F7', fontSize: 9 } },
          { text: fmtAreaCell(totalPy), options: { bold: true, color: '1A3A5C', fill: 'EEF2F7', align: 'right', fontSize: 8 } },
          { text: fmtAreaCell(totalCPy), options: { bold: true, color: '1A3A5C', fill: 'DDE6F0', align: 'right', fontSize: 8 } },
        ];
        slide.addTable([headerRow, ...dataTableRows, totalRow], {
          x: tableX, y: tableY,
          w: tableW,
          rowH: ROW_H,
          border: { pt: 0.5, color: 'C8D0DC' },
          colW: [COL_CLR, COL_NAME, COL_REAL, COL_CONTRACT],
        });
      }
    }

    // ── 전체 현황 요약 슬라이드 ──────────────────────────
    const allFloorAreas = {};
    FLOOR_ORDER.forEach(fk => { allFloorAreas[fk] = calcFloorAreas(fk); });

    const activeIds = new Set();
    FLOOR_ORDER.forEach(fk => Object.keys(allFloorAreas[fk]).forEach(cid => activeIds.add(+cid)));
    companies.forEach(co => {
      if (((co.extras||[]).length > 0) || ((co.gita||{}).actualPy > 0)) activeIds.add(co.id);
    });
    const activeCos = companies.filter(co => activeIds.has(co.id));

    if (activeCos.length > 0) {
      const sumSlide = pptx.addSlide();
      sumSlide.background = { color: 'F5F7FA' };

      // 타이틀 바
      sumSlide.addText('🏭 아암센터 면적 관리  —  전체 면적 현황 요약', {
        x: 0, y: 0, w: SLIDE_W, h: 0.43,
        fill: { color: '1A3A5C' },
        line: { type: 'none' },
        fontSize: 16, bold: true, color: 'FFFFFF',
        valign: 'middle',
        inset: 0.12,
      });

      // 테이블 구성
      const floorShortLabels = { '1F':'1F 전체', '2F':'2F 전체', '2-2F':'2F 메자닌', '4F':'4F 전체', '4-2F':'4F 메자닌' };
      const isMez = fk => fk === '2-2F' || fk === '4-2F';

      // 슬라이드 폭에 맞춘 컬럼 너비 (inches). 합계 12.7in = IMG_W 이내
      const COL_CLR  = 0.18;  // 회사 색상 표시
      const COL_CO   = 1.82;  // 회사명 (COL_CLR 만큼 줄임)
      const COL_FL   = 1.4;   // 층별 (×5 = 7.0in)
      const COL_GITA = 1.1;   // 기타
      const COL_EX   = 1.1;   // 그외
      const COL_TOTAL= 1.5;   // 합계
      const colWArr = [COL_CLR, COL_CO, ...FLOOR_ORDER.map(() => COL_FL), COL_GITA, COL_EX, COL_TOTAL];

      const totalRows = activeCos.length + 2;        // 헤더 + 데이터행 + 합계행
      const availH    = SLIDE_H - 0.55 - 0.28;       // tableY=0.55, 하단 여백 0.28
      const ROW_H     = Math.min(0.45, availH / totalRows);
      const FS_HDR    = ROW_H < 0.30 ? 7 : 9;
      const FS_DAT    = ROW_H < 0.30 ? 8 : 10;
      const FS_TOT    = FS_DAT;

      const hStyle = (bg) => ({
        bold: true, color: 'FFFFFF', fill: bg || '2D5A8E',
        align: 'center', fontSize: FS_HDR, valign: 'middle',
        margin: [2, 4, 2, 4],
      });
      const cStyle = (opts) => ({
        color: '1A1A1A', fill: 'FFFFFF',
        fontSize: FS_DAT, valign: 'middle',
        margin: [2, 6, 2, 6],
        ...opts,
      });
      const totalStyle = (opts) => ({
        bold: true, color: '1A3A5C', fill: 'DDE6F0',
        fontSize: FS_TOT, valign: 'middle',
        margin: [2, 6, 2, 6],
        ...opts,
      });

      // 헤더 행
      const headerRow = [
        { text: '', options: hStyle('1A3A5C') },
        { text: '회사', options: hStyle('1A3A5C') },
        ...FLOOR_ORDER.map(fk => ({ text: floorShortLabels[fk] + '\n(실/계약)', options: hStyle(isMez(fk) ? '3D6B9E' : '2D5A8E') })),
        { text: '기타\n(실/계약)', options: hStyle('2E7D52') },
        { text: '그외', options: hStyle('5A6E8A') },
        { text: '합계\n(실/계약)', options: hStyle('0F2A46') },
      ];

      // 데이터 행
      const colTotals = { gita: 0, gitaC: 0, extras: 0, grand: 0, grandC: 0 };
      const colFloorTotals = {};
      const colFloorContractTotals = {};
      FLOOR_ORDER.forEach(fk => { colFloorTotals[fk] = 0; colFloorContractTotals[fk] = 0; });

      const fmtPy = v => v > 0 ? Math.round(v) + '평' : '—';
      const fmtDual = (realPy, cpyVal) => {
        if (realPy <= 0) return '—';
        return '실 ' + Math.round(realPy) + '평\n계 ' + Math.round(cpyVal) + '평';
      };

      const dataRows = activeCos.map((co, idx) => {
        const rowBg = idx % 2 === 1 ? 'F4F7FB' : 'FFFFFF';
        let grand = 0;
        let grandC = 0;
        const floorCells = FLOOR_ORDER.map(fk => {
          const mm2 = allFloorAreas[fk][co.id] || 0;
          const pyVal = mm2 / 3.3e6;
          const cpyVal = pyVal > 0 ? contractPy(fk, pyVal) : 0;
          colFloorTotals[fk] += pyVal;
          colFloorContractTotals[fk] += cpyVal;
          grand += pyVal;
          grandC += cpyVal;
          return {
            text: fmtDual(pyVal, cpyVal),
            options: cStyle({ align: 'right', fill: rowBg, color: pyVal > 0 ? '1A1A1A' : 'BBBBBB', fontSize: FS_DAT - 1 }),
          };
        });
        const gitaActual = (co.gita||{}).actualPy || 0;
        const gitaC = gitaContractPy(co);
        colTotals.gita += gitaActual;
        colTotals.gitaC += gitaC;
        grand += gitaActual;
        grandC += gitaC;
        const extrasPy = (co.extras||[]).reduce((s, ex) => s + (ex.py||0), 0);
        colTotals.extras += extrasPy;
        grand += extrasPy;
        grandC += extrasPy;
        colTotals.grand += grand;
        colTotals.grandC += grandC;
        return [
          { text: '', options: cStyle({ fill: co.color.replace('#',''), align: 'center' }) },
          { text: co.name, options: cStyle({ align: 'left', fill: rowBg, bold: true }) },
          ...floorCells,
          { text: fmtDual(gitaActual, gitaC), options: cStyle({ align: 'right', fill: rowBg, color: gitaActual > 0 ? '1A1A1A' : 'BBBBBB', fontSize: FS_DAT - 1 }) },
          { text: fmtPy(extrasPy), options: cStyle({ align: 'right', fill: rowBg, color: extrasPy > 0 ? '1A1A1A' : 'BBBBBB' }) },
          { text: '실 ' + Math.round(grand) + '평\n계 ' + Math.round(grandC) + '평', options: cStyle({ align: 'right', fill: rowBg, bold: true, color: '0F2A46', fontSize: FS_DAT - 1 }) },
        ];
      });

      // 합계 행
      const sumRow = [
        { text: '', options: totalStyle({ align: 'center' }) },
        { text: '합계', options: totalStyle({ align: 'center' }) },
        ...FLOOR_ORDER.map(fk => ({
          text: colFloorTotals[fk] > 0 ? '실 ' + Math.round(colFloorTotals[fk]) + '평\n계 ' + Math.round(colFloorContractTotals[fk]) + '평' : '—',
          options: totalStyle({ align: 'right', color: colFloorTotals[fk] > 0 ? '1A3A5C' : 'BBBBBB', fontSize: FS_TOT - 1 }),
        })),
        { text: colTotals.gita > 0 ? '실 ' + Math.round(colTotals.gita) + '평\n계 ' + Math.round(colTotals.gitaC) + '평' : '—', options: totalStyle({ align: 'right', fontSize: FS_TOT - 1 }) },
        { text: fmtPy(colTotals.extras), options: totalStyle({ align: 'right' }) },
        { text: '실 ' + Math.round(colTotals.grand) + '평\n계 ' + Math.round(colTotals.grandC) + '평', options: totalStyle({ align: 'right', color: '0F2A46', fontSize: FS_TOT - 1 }) },
      ];

      sumSlide.addTable([headerRow, ...dataRows, sumRow], {
        x: MARGIN, y: 0.55,
        colW: colWArr,
        rowH: ROW_H,
        border: { pt: 0.8, color: 'B8C8DC' },
      });

      // 단위 안내
      sumSlide.addText('단위: 평 (1평 = 3.3m²)', {
        x: MARGIN, y: SLIDE_H - 0.24, w: SLIDE_W - MARGIN * 2, h: 0.2,
        fontSize: 10, color: '718096', align: 'right',
      });
    }

    await pptx.writeFile({ fileName: '물류센터_평수현황.pptx' });
  } catch(e) {
    alert('PPT 생성 오류: ' + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '📥 PPT';
  }
}
